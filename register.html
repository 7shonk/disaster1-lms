<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨系統授權登入 - 防災學習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .gradient-text {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans text-white overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-20"></div>

    <div class="bg-slate-800/80 backdrop-blur-xl p-10 rounded-2xl border border-slate-700 shadow-2xl w-full max-w-md relative z-10">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold mb-2 gradient-text">Disaster LMS </h1>
            <p class="text-gray-400 text-sm">請登入或註冊以連動您的天氣行事曆帳號</p>
        </div>

        <div id="authContent" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">學生姓名 (使用者名稱，註冊用)</label>
                <input type="text" id="usernameInput" placeholder="例如: 王小明" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">帳號 (Email)</label>
                <input type="email" id="emailInput" placeholder="例如: student@nutn.edu.tw" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">密碼 (最少 6 碼)</label>
                <input type="password" id="passwordInput" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition" required>
            </div>
            
            <div id="errorMsg" class="hidden text-red-400 text-sm font-bold text-center"></div>
 
            <div class="flex gap-3 mt-6">
                <button onclick="handleAuth('login')" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg">
                    登入
                </button>
                <button onclick="handleAuth('register')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-lg transition border border-slate-600">
                    註冊新帳號
                </button>
            </div>
        </div>

        <div id="loadingState" class="hidden flex-col items-center justify-center py-6">
            <svg class="animate-spin h-10 w-10 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p id="loadingText" class="text-sm text-blue-400 font-bold">正在驗證身分...</p>
        </div>
    </div>

    <script>
        // ==========================================
        // Supabase 設定 (與 index.html 相同)
        // ==========================================
        const supabaseUrl = 'https://ovyygcsuiwwbgoywplbq.supabase.co';
        const supabaseKey = 'sb_publishable_Rfekybrmzpc7rjaHAq5Q8Q_ChnHYcAI'; 
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleAuth(action) {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const username = document.getElementById('usernameInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!email || password.length < 6) {
                errorMsg.innerText = "請輸入有效的信箱，且密碼至少需 6 碼！";
                errorMsg.classList.remove('hidden');
                return;
            }

            if (action === 'register' && !username) {
                errorMsg.innerText = "註冊新帳號時，學生姓名不能為空！";
                errorMsg.classList.remove('hidden');
                return;
            }

            // UI 切換為 Loading
            document.getElementById('authContent').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('loadingState').style.display = 'flex';
            document.getElementById('loadingText').innerText = action === 'login' ? "登入驗證中，請稍候..." : "正在為您建立帳號...";

            try {
                let result;
                if (action === 'register') {
                    // 1. 執行註冊 (帶入學生姓名到 user_metadata)
                    result = await supabaseClient.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            data: {
                                display_name: username
                            }
                        }
                    });
                } else {
                    // 2. 執行登入
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                }

                if (result.error) throw result.error;

                // 成功後，取得並儲存學生姓名至 localStorage
                const user = result.data.user;
                const displayName = (user && user.user_metadata && user.user_metadata.display_name)
                    ? user.user_metadata.display_name
                    : (username || email.split('@')[0]);
                
                localStorage.setItem('studentName', displayName);

                // 成功後，跳轉到中控台
                window.location.href = 'index.html';

            } catch (error) {
                // 失敗的話，退回輸入畫面並顯示錯誤
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('authContent').classList.remove('hidden');
                errorMsg.innerText = `錯誤：${error.message}`;
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
